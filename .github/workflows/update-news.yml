name: Update News Digest Data and Pages

on:
  schedule:
    - cron: '0 21 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: agathon-news-digest-pages
  cancel-in-progress: false

jobs:
  update-news:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Install
        run: npm ci

      - name: Fetch RSS
        run: npm run fetch:rss
        env:
          RSS_FETCH_RETRIES: 2
          RSS_FETCH_TIMEOUT_MS: 12000
          RSS_FETCH_LIMIT_PER_SOURCE: 8

      - name: Generate AI summaries
        run: npm run summarize
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          AI_MODEL: ${{ vars.AI_MODEL || 'gpt-4.1-mini' }}
          AI_SUMMARY_LIMIT: ${{ vars.AI_SUMMARY_LIMIT || '20' }}

      - name: Test
        run: npm test

      - name: Build Pages artifact
        run: npm run build

      - name: Commit generated news
        run: |
          if git diff --quiet -- src/generated/news.json; then
            echo "No generated news changes to commit."
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add src/generated/news.json
            git commit -m "Update generated news digest data"
            git push
          fi

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
