name: Deploy マネークリップ to Pages

# app/ を更新して push するたびに、gh-pages ブランチを更新してスマホに反映。
# 改良 → push → スマホに即反映、のループ。

on:
  push:
    branches: ["main"]
    paths:
      - "app/**"
      - ".github/workflows/deploy-pages.yml"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy app/ to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./app
          force_orphan: true
          commit_message: "マネークリップ を更新"
