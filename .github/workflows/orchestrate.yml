name: AGATHON Orchestrator

# Runs the orchestration OS (Ethan -> agent -> Guard -> report) on demand.
# Manual dispatch keeps model token spend deliberate; a schedule can be added
# later once the cost profile is understood (see the commented block below).

on:
  workflow_dispatch:
    inputs:
      task:
        description: 'Ionの依頼（タスク文）'
        required: true
        default: '最新のAIニュースを3行でまとめて'
      runtime:
        description: '実行ランタイム'
        required: true
        default: 'claude-code'
        type: choice
        options:
          - claude-code
          - plan
      max_tokens:
        description: '1エージェントあたりの最大出力トークン'
        required: false
        default: '600'
  # Scheduled autonomous runs (opt-in — uncomment to enable; consumes API tokens):
  # schedule:
  #   - cron: '0 22 * * *'

permissions:
  contents: read

concurrency:
  group: agathon-orchestrator
  cancel-in-progress: false

jobs:
  orchestrate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install
        run: npm ci

      - name: Sanity check (no key needed)
        run: npm run test:orchestrator

      - name: Run orchestrator
        id: run
        env:
          # AGATHON_CLAUDE_CODE + a key activate the claude-code runtime.
          # If the key is missing, the runtime falls back to `plan` automatically.
          AGATHON_CLAUDE_CODE: '1'
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          AGATHON_CLAUDE_MODEL: ${{ vars.AGATHON_CLAUDE_MODEL || 'claude-opus-4-8' }}
          AGATHON_MAX_TOKENS: ${{ inputs.max_tokens }}
          TASK: ${{ inputs.task }}
          RUNTIME: ${{ inputs.runtime }}
        run: |
          set -o pipefail
          node scripts/orchestrate.mjs "$TASK" --runtime="$RUNTIME" | tee orchestrator-output.txt

      - name: Publish report to job summary
        if: always()
        run: |
          {
            echo "# AGATHON Orchestrator"
            echo ""
            echo "**Task:** ${{ inputs.task }}"
            echo "**Runtime:** ${{ inputs.runtime }}"
            echo ""
            echo '```'
            cat orchestrator-output.txt 2>/dev/null || echo "(no output captured)"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
