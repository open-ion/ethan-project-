<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0e7c66">
<title>イオンのアプリ置き場</title>
<style>
  :root{--bg:#0b1220;--card:#141d2e;--line:#27344f;--txt:#e8eef7;--muted:#93a1b8;--accent:#16b894;--accent2:#0e7c66}
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  body{margin:0;background:var(--bg);color:var(--txt);
    font-family:-apple-system,BlinkMacSystemFont,"Hiragino Kaku Gothic ProN","Noto Sans JP",sans-serif;
    line-height:1.6}
  .wrap{max-width:520px;margin:0 auto;padding:0 14px 60px}
  .top{background:linear-gradient(135deg,var(--accent2),#0a5f4f);
    padding:calc(env(safe-area-inset-top) + 22px) 18px 22px;margin-bottom:18px}
  .top h1{margin:0;font-size:20px;letter-spacing:.5px}
  .top p{margin:4px 0 0;font-size:12px;color:#d7f5ec}
  .app{display:flex;align-items:center;gap:14px;background:var(--card);border:1px solid var(--line);
    border-radius:16px;padding:16px;margin-bottom:12px;text-decoration:none;color:var(--txt)}
  .app .ic{width:48px;height:48px;border-radius:12px;flex:none}
  .app .ttl{font-weight:800;font-size:16px}
  .app .sub{font-size:12px;color:var(--muted)}
  .app .arrow{margin-left:auto;color:var(--muted);font-size:20px}
  .badge{display:inline-block;font-size:10px;padding:2px 8px;border-radius:999px;
    background:#13352b;color:#46d8b3;margin-left:6px}
  .note{font-size:11px;color:var(--muted);margin-top:18px;text-align:center}
</style>
</head>
<body>
  <div class="top">
    <h1>📦 イオンのアプリ置き場</h1>
    <p>ここから各アプリを開く。原本はGitHubに、公開はアプリごとに別URL。</p>
  </div>
  <div class="wrap">

    <a class="app" href="./moneyclip/index.html">
      <img class="ic" src="./moneyclip/icons/icon.svg" alt="">
      <div>
        <div class="ttl">マネークリップ<span class="badge">公開中</span></div>
        <div class="sub">副業×確定申告×ほったらかし投資の見える化</div>
      </div>
      <div class="arrow">›</div>
    </a>

    <!-- 新しいアプリは apps/<名前>/ を作ってここに1行足すだけ。既存は上書きされない。 -->

    <div class="note">原本は GitHub の <code>apps/</code> に各アプリ別フォルダで保管。<br>
    試作するときは原本をコピーして新フォルダで。既存アプリは絶対に上書きされない。</div>
  </div>
</body>
</html>
