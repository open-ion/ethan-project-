<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#ffffff">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="5分ニュース">
  <link rel="apple-touch-icon" href="./apple-touch-icon-180.png">
  <link rel="manifest" href="./manifest.webmanifest">
  <link rel="icon" href="./icon-192.png">
  <link rel="stylesheet" href="./app.css">
  <title>5分ニュースダイジェスト</title>
</head>
<body>
  <div class="app">
    <header>
      <div class="row">
        <div class="brand">📰 5分ニュースダイジェスト</div>
        <div style="display:flex;gap:6px;">
          <a class="iconbtn" href="./briefings.html" aria-label="予定済み" style="text-decoration:none;line-height:32px;">📅</a>
          <button id="settingsBtn" class="iconbtn" aria-label="ジャンル設定">⚙</button>
        </div>
      </div>
      <div class="date" id="dateLabel">読み込み中…</div>
      <nav class="tabs" id="tabs" role="tablist"></nav>
    </header>

    <main id="main">
      <div class="loading" id="loading">読み込み中…</div>
    </main>

    <!-- ジャンル選択パネル -->
    <div class="sheet" id="sheet" hidden>
      <div class="sheet-bg" id="sheetBg"></div>
      <div class="sheet-body">
        <h2>表示するジャンル</h2>
        <p class="muted">気になるカテゴリだけ選べます（端末に保存）。</p>
        <div id="genreToggles"></div>
        <button class="primary" id="sheetDone">完了</button>
      </div>
    </div>

    <footer>
      自動更新: 5分ニュースダイジェスト ・ 出典: NHKニュース<br>
      記事の著作権は各報道機関に帰属します。
    </footer>
  </div>
  <script src="./app.js"></script>
</body>
</html>
