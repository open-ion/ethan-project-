name: Update News Digest Data

on:
  schedule:
    - cron: '0 21 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-news:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install
        run: npm install

      - name: Fetch RSS
        run: npm run fetch:rss

      - name: Prepare summaries
        run: npm run summarize
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Commit generated news
        run: |
          if git diff --quiet -- src/generated/news.json; then
            echo "No generated news changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/generated/news.json
          git commit -m "Update generated news digest data"
          git push
